services:
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vcbrain_test
      POSTGRES_PASSWORD: vcbrain_test
      POSTGRES_DB: vcbrain_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcbrain_test -d vcbrain_test"]
      interval: 3s
      retries: 20
  test-cache:
    image: redis:7-alpine
  tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    environment:
      ENV: test
      SECRET_KEY: test-secret-key-that-is-longer-than-thirty-two-bytes
      DATABASE_URL: postgresql+asyncpg://vcbrain_test:vcbrain_test@test-db:5432/vcbrain_test
      TEST_DATABASE_URL: postgresql+asyncpg://vcbrain_test:vcbrain_test@test-db:5432/vcbrain_test
      REDIS_URL: redis://test-cache:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /tmp/vcbrain-test-storage
      AUTO_CREATE_SCHEMA: "true"
      QUEUE_EAGER: "true"
    command: ["pytest", "-q", "--cov=app", "--cov-report=term-missing"]
    depends_on:
      test-db:
        condition: service_healthy
      test-cache:
        condition: service_started
