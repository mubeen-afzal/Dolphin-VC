services:
  api:
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      --proxy-headers --log-config /srv/config/logging.conf"
    volumes:
      - ./backend:/srv
      - ./config:/srv/config:ro
  worker:
    volumes:
      - ./backend:/srv
      - ./config:/srv/config:ro
  scheduler:
    volumes:
      - ./backend:/srv
      - ./config:/srv/config:ro

